      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="isle1-land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
  </defs>
  <rect width="768" height="1024" fill="#0f0a1a"/>
  <ellipse cx="300" cy="400" rx="280" ry="180" fill="url(#isle1-glow)"/>
  <!-- Floating island -->
  <path d="M120,260 Q200,200 300,210 Q400,200 480,260 Q460,320 300,340 Q140,320 120,260Z" fill="url(#isle1-land)" stroke="#a78bfa" stroke-width="1" opacity="0.9"/>
