<svg xmlns="http://www.w3.org/2000/svg" width="256" height="384" viewBox="0 0 256 384">
  <defs>
    <linearGradient id="hm-robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
    <filter id="hm-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Robe -->
  <path d="M84,140 L76,310 Q128,320 180,310 L172,140 Z" fill="url(#hm-robe)" filter="url(#hm-glow)"/>
  <!-- Head -->
  <circle cx="128" cy="100" r="38" fill="#fef3c7"/>
  <!-- Hat -->
  <polygon points="128,20 86,108 170,108" fill="#4c1d95" stroke="#c4b5fd" stroke-width="1"/>
  <circle cx="128" cy="25" r="5" fill="#c4b5fd"/>
  <!-- Eyes -->
  <circle cx="114" cy="100" r="4" fill="#4c1d95"/>
  <circle cx="142" cy="100" r="4" fill="#4c1d95"/>
  <!-- Mouth -->
  <path d="M118,115 Q128,122 138,115" fill="none" stroke="#92400e" stroke-width="1.5"/>
  <!-- Staff -->
  <rect x="186" y="70" width="6" height="240" rx="3" fill="#78350f"/>
  <circle cx="189" cy="65" r="14" fill="#a78bfa" opacity="0.8"/>
  <circle cx="189" cy="65" r="8" fill="#c4b5fd"/>
  <!-- Spell particles -->
  <circle cx="175" cy="55" r="2" fill="#ddd6fe" opacity="0.6"/>
  <circle cx="200" cy="50" r="1.5" fill="#e9d5ff" opacity="0.5"/>
  <circle cx="195" cy="78" r="2" fill="#ddd6fe" opacity="0.7"/>
</svg>
