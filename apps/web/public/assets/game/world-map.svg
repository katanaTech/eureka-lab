<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="sky" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0a1a"/>
    </radialGradient>
    <radialGradient id="star">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="200" cy="100" r="2" fill="#e2e8f0" opacity="0.8"/>
  <circle cx="500" cy="150" r="1.5" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="900" cy="80" r="2.5" fill="#fef3c7" opacity="0.7"/>
  <circle cx="1300" cy="120" r="1.8" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="1600" cy="90" r="2" fill="#c4b5fd" opacity="0.9"/>
  <circle cx="350" cy="200" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="1100" cy="180" r="1.5" fill="#fff" opacity="0.6"/>
  <!-- Floating islands silhouettes -->
  <ellipse cx="300" cy="500" rx="180" ry="60" fill="#4c1d95" opacity="0.5"/>
  <ellipse cx="750" cy="400" rx="200" ry="70" fill="#5b21b6" opacity="0.5"/>
  <ellipse cx="1200" cy="450" rx="190" ry="65" fill="#6d28d9" opacity="0.5"/>
  <ellipse cx="1600" cy="380" rx="170" ry="55" fill="#7c3aed" opacity="0.5"/>
  <!-- Mist layer -->
  <rect y="800" width="1920" height="280" fill="#0f0a1a" opacity="0.7"/>
  <text x="960" y="960" text-anchor="middle" font-family="serif" font-size="32" fill="#a78bfa" opacity="0.3">REALM MAP</text>
</svg>
