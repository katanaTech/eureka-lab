<svg xmlns="http://www.w3.org/2000/svg" width="256" height="384" viewBox="0 0 256 384">
  <defs>
    <linearGradient id="hw-armor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <filter id="hw-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#f87171" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Body/Armor -->
  <rect x="84" y="140" width="88" height="110" rx="10" fill="url(#hw-armor)" filter="url(#hw-glow)"/>
  <!-- Head -->
  <circle cx="128" cy="100" r="38" fill="#fef3c7"/>
  <!-- Helmet -->
  <path d="M90,100 Q90,62 128,58 Q166,62 166,100" fill="#991b1b" stroke="#fca5a5" stroke-width="1"/>
  <!-- Eyes -->
  <circle cx="114" cy="100" r="4" fill="#1e293b"/>
  <circle cx="142" cy="100" r="4" fill="#1e293b"/>
  <!-- Mouth -->
  <path d="M118,115 Q128,120 138,115" fill="none" stroke="#92400e" stroke-width="1.5"/>
  <!-- Sword -->
  <rect x="180" y="100" width="6" height="90" rx="2" fill="#e2e8f0"/>
  <rect x="172" y="100" width="22" height="6" rx="2" fill="#b45309"/>
  <polygon points="183,100 177,60 189,60" fill="#e2e8f0"/>
  <!-- Shield -->
  <ellipse cx="60" cy="185" rx="28" ry="35" fill="#991b1b" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="60" y="190" text-anchor="middle" font-family="serif" font-size="18" fill="#fef3c7">E</text>
  <!-- Legs -->
  <rect x="94" y="250" width="26" height="65" rx="6" fill="#7f1d1d"/>
  <rect x="136" y="250" width="26" height="65" rx="6" fill="#7f1d1d"/>
</svg>
